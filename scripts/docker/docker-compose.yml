services:
  docker-linux:
    build: ./linux
    platform: linux/arm64
    image: linux:latest  # Use a custom name, not ubuntu:24.04
    container_name: root-linux
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '0.5'
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "2222:22"
    # IMPORTANT: Remove any "command" line that might override the Dockerfile
    # Do NOT add command: /bin/bash or anything else here